{% extends 'base.html' %}

{% block title %}E-mail Enviado — PUC Encontra{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Verifique seu E-mail</h1>
    <p class="auth-subtitle">
        Se existir uma conta com o e-mail informado, você receberá instruções para redefinir sua senha.
        Verifique também a pasta de spam.
    </p>

    <p class="auth-link">
        <a href="{% url 'login' %}">Voltar para o login</a>
    </p>
</div>
{% endblock %}
